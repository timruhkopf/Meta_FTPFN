# Default configuration for PPFN training
# Override with specific experiments via configs/experiment/

defaults:
  - model: ppfn
  - dataset: same_task_new_sample
  - optimizer: adamw
  - scheduler: cosine
  - trainer: default
  - _self_

device: "cuda"
experiment_name: "ppfn:same_task_new_sample"
run_name: null

hydra:
  run:
    dir: ${oc.env:ROOT}/outputs/${experiment_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}_${run_name}
  sweep:
    dir: ${oc.env:ROOT}/outputs/${experiment_name}/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}_${run_name}

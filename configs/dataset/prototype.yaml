dataset_class:
  _target_: prototype.harmonic_restart.harmonic_prior.GlobalSparseHarmonicsStream
  batch_size: 256
  n_A: 10
  n_B: 50
  n_test: 300
  x_range:
    - -5
    - 5
  noise_std: 0.05
  num_components: 4
  share_unrelated: 0.
  scale: True
  shift: True
  warp: False

dataloader_class:
  _target_: torch.utils.data.DataLoader
  batch_size: 1
  collate_fn:
    _partial_: True
    _target_: ppfn.utils.mybatch.identity

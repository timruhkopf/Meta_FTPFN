# Default trainer configuration
epochs: ${dataset.store_prior.n_chunks }
steps: ${div:${dataset.store_prior.chunk_size },${dataset.store_prior.batch_size}}
# number of batches assuming chunk_size=1008 and batch_size=16

trainer_class:
  _target_: ppfn.trainer.PPFNTrainer
  use_amp: false
  grad_clip: 1.0
  aggregate_k_gradients: 1
  verbose: true


  callbacks:
    # (GENERAL CALLBACKS)  ------------------------
    - _target_: ppfn.trainer.callbacks.mlflow_callback.MLflowCallback
      experiment_name: ${experiment_name}
      run_name: ${run_name}
      mlflow_tracking_uri: Null
    - _target_: ppfn.trainer.callbacks.grad_clipping.GradientClippingCallback
      frequency: 1

    # (TRAIN METRICS CALLBACK)  ------------------------
    # collect NLL, KL, Distrib. properties during training
    - _target_: ppfn.model.mymodel.cross_fusion.TrainMetricsCallback
    # NOTICE, that this callback must appear before the CrossFusionLossCallback,
    # because it relies on the entire loss and not the cropped one!

    # (TRAINING CALLBACKS)  ------------------------
    # CROP THE LOSS for training on STREAM C only
    - _target_: ppfn.model.mymodel.cross_fusion.CrossFusionLossCallback


    # (SYNTHETIC BENCHMARK METRICS)  ------------------------
    # SYNTHETIC SAME TASK
    - _target_: ppfn.trainer.callbacks.meta_test_callback.MetaTestCallback
      device: ${device}
      switch_to_eval: False
      dataset:
        _target_: ppfn.dataset.synthetic_task_meta_test_dataset.SyntheticTaskMetaTestDataset
        name: synthetic_same_task
        get_batch_fn:
          _target_:  ppfn.dataset.get_batch.same_task.get_batch
          _partial_: True
        data_path: ${oc.env:DATADIR}/validation
        single_eval_pos: 128
        device: ${device}
        # kwargs for generating the dataset:
        n_chunks: 1
        chunk_size: 100
        batch_size: 10 # 100 # half this number is number of pairs of items (bnn) per batch

    # SYNTHETIC UNRELATED TASK
    - _target_: ppfn.trainer.callbacks.meta_test_callback.MetaTestCallback
      device: ${device}
      switch_to_eval: False
      dataset:
        _target_: ppfn.dataset.synthetic_task_meta_test_dataset.SyntheticTaskMetaTestDataset
        name: synthetic_unrelated_task
        get_batch_fn:
          _target_: ppfn.dataset.get_batch.ftpfn.get_batch
          _partial_: True
        data_path: ${oc.env:DATADIR}/validation
        single_eval_pos: 128
        device: ${device}
        # kwargs for generating the dataset:
        n_chunks: 1 # number of files
        chunk_size: 100 # number of items per file
        batch_size: 10  # number of unrelated tasks (bnn) items in batch (half them to get the n-pairs)

    # (REAL BENCHMARK METRICS)  ------------------------
    # LCBench
    - _target_: ppfn.trainer.callbacks.meta_test_callback.MetaTestCallback
      device: ${device}
      dataset:
        _target_: ppfn.dataset.mfpbench.meta_test_dataset.MFPBenchMetaTestDataset
        benchmark_name: lcbench_tabular
        data_path: ${oc.env:DATADIR}/validation
        single_eval_pos: 128
        n_folds: 3
        device: ${device}


    # TaskSet
    - _target_: ppfn.trainer.callbacks.meta_test_callback.MetaTestCallback
      device: ${device}
      dataset:
        _target_: ppfn.dataset.mfpbench.meta_test_dataset.MFPBenchMetaTestDataset
        benchmark_name: taskset_tabular
        data_path: ${oc.env:DATADIR}/validation
        single_eval_pos: 128
        n_folds: 3
        device: ${device}

    # PD1
    - _target_: ppfn.trainer.callbacks.meta_test_callback.MetaTestCallback
      device: ${device}
      dataset:
        _target_: ppfn.dataset.mfpbench.meta_test_dataset.MFPBenchMetaTestDataset
        benchmark_name: pd1_tabular
        data_path: ${oc.env:DATADIR}/validation
        single_eval_pos: 128
        n_folds: 3
        device: ${device}


